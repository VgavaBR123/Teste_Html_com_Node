<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envio de Mensagem</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            max-width: 500px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }
        #response {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Enviar Mensagem</h1>
    <input type="text" id="messageInput" placeholder="Digite sua mensagem aqui">
    <button id="sendButton">Enviar</button>

    <div id="response"></div>

    <script>
        document.getElementById('sendButton').addEventListener('click', () => {
            const message = document.getElementById('messageInput').value;
            fetch('https://seu-backend-url/api', { // Substitua pela URL do seu backend
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ message }),
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('response').innerText = `Resposta do servidor: ${data.response}`;
            })
            .catch(error => {
                console.error('Erro:', error);
                document.getElementById('response').innerText = 'Erro ao enviar a mensagem';
            });
        });
    </script>
</body>
</html>
